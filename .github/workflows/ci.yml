name: Validation

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Node 22 validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: 'true'
      TURBO_TELEMETRY_DISABLED: '1'
      DO_NOT_TRACK: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install pinned pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0
          run_install: false

      - name: Install pinned Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Verify toolchain pins
        shell: bash
        run: |
          test "$(node --version)" = "v22.18.0"
          test "$(pnpm --version)" = "10.33.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Playwright Chromium and Linux dependencies
        run: pnpm --filter @chief/e2e exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Self-test secret policy
        run: node tools/secret-policy/self-test.mjs

      - name: Scan repository for secrets
        run: node tools/secret-policy/scan.mjs --repo . --format text
