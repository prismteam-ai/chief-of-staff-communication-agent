name: chief-of-staff-rag-local

# Local OpenSearch replay (brief constraint 2, design.md §4 "local proof"). Version pinned to
# 2.15 to match RagStack's `EngineVersion.OPENSEARCH_2_15` (lib/stacks/rag-stack.ts) — the local
# replay and the deployed domain run the same engine major/minor, and both connect through
# `@chief-of-staff/rag`'s `chunksIndexBody()` mapping and `OpenSearchRetrievalIndex` adapter, so
# `just rag-replay-local` exercises the SAME index mapping + query code as production, just against
# a container instead of the managed domain.
services:
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: chief-of-staff-rag-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
